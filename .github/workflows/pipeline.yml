name: data-pipeline


on:
  workflow_dispatch: {} # for manual trigger
  schedule:
    # everyday at 03:00 UTC
    - cron: "0 3 * * *"

permissions:
  contents: read

concurrency:
  group: data-pipeline
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install MeCab system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y mecab libmecab-dev mecab-ipadic-utf8
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      # GCP Auth
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      # Run tests
      - name: Run unit tests
        run: |
          pytest -q

      - name: Run pipeline
        env:
          # app config (replaces .env in CI)
          PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          DATASET_ID: ${{ secrets.BQ_DATASET_ID }}
          TABLE_PREFIX: ${{ secrets.BQ_TABLE_PREFIX }}
          # cost-control: avoid endless appends
          WRITE_MODE: "truncate"
        run: |
          python -m src.reason_extraction.main \
            --input-file data/input/sample_hotel_reviews.csv \
            --output bigquery